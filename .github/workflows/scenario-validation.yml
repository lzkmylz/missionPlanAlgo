name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  validate-scenarios:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Validate scenarios
        run: |
          if [ -d "scenarios" ] && [ "$(ls -A scenarios/*.json 2>/dev/null)" ]; then
            for scenario in scenarios/*.json; do
              echo "Validating $scenario..."
              python -m utils.entity validate "$scenario"
            done
          else
            echo "No scenarios to validate"
          fi

      - name: Check production feasibility
        if: github.ref == 'refs/heads/main' && hashFiles('scenarios/production.json') != ''
        run: python -m utils.entity validate scenarios/production.json --verbose
